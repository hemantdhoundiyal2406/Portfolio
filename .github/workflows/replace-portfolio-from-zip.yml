name: Replace portfolio from ZIP

on:
  push:
    paths:
      - ".github/workflows/replace-portfolio-from-zip.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download replacement payload
        env:
          ZIP_URL: "https://kids-plate-awards-maybe.trycloudflare.com/portfolio.zip"
        run: |
          set -euo pipefail
          curl -fL "$ZIP_URL" -o /tmp/portfolio.zip
          rm -rf /tmp/portfolio-payload
          mkdir -p /tmp/portfolio-payload
          unzip -q /tmp/portfolio.zip -d /tmp/portfolio-payload

      - name: Replace repository files
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          shopt -s dotglob nullglob
          cp -R /tmp/portfolio-payload/* .
          git status --short

      - name: Commit replacement
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Replace portfolio contents"
          git push
