name: Remove badge and enable Pages

on:
  push:
    paths:
      - ".github/workflows/remove-badge-and-enable-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-and-enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove availability badge
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text()
          old = '''                <div class="badge-container">
                              <span class="hero-badge">
                                  <svg class="badge-icon animate-pulse" width="8" height="8" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <circle cx="4" cy="4" r="3.5" fill="#00f2fe" stroke="#00f2fe" stroke-opacity="0.3" stroke-width="1"/>
                                  </svg>
                                  Available for Opportunities
                              </span>
                          </div>
          '''.replace('              ', '  ')
          if old not in html:
              import re
              html = re.sub(r'\n\s*<div class="badge-container">\s*<span class="hero-badge">\s*<svg class="badge-icon animate-pulse".*?</svg>\s*Available for Opportunities\s*</span>\s*</div>', '', html, count=1, flags=re.S)
          else:
              html = html.replace(old, '')
          if 'Available for Opportunities' in html:
              raise SystemExit('Badge text still present after edit')
          path.write_text(html)
          PY
          rm -f .github/workflows/remove-badge-and-enable-pages.yml

      - name: Commit site edit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove availability badge"
            git push
          fi

      - name: Enable GitHub Pages from main root
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api repos/${{ github.repository }}/pages >/tmp/pages.json 2>/tmp/pages.err; then
            gh api --method PUT repos/${{ github.repository }}/pages \
              -F source[branch]=main \
              -F source[path]=/ \
              --silent
          else
            gh api --method POST repos/${{ github.repository }}/pages \
              -F source[branch]=main \
              -F source[path]=/ \
              --silent
          fi
